# docker-compose.yml - TaskMaster Development Environment
# NOTE: For production, use environment-specific secrets management

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmaster-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-taskmaster}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - POSTGRES_DB=${DB_NAME:-taskmaster}
      - POSTGRES_HOST_AUTH_METHOD=md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskmaster}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskmaster-network

  backend:
    build: ./backend
    container_name: taskmaster-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-taskmaster}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-taskmaster}
      - DB_POOL_MIN=2
      - DB_POOL_MAX=10
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taskmaster-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: taskmaster-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskmaster-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  taskmaster-network:
    driver: bridge
