version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmaster-postgres
    environment:
      - POSTGRES_USER=aggimallaabhishek
      - POSTGRES_PASSWORD=taskmaster_dev_password
      - POSTGRES_DB=taskmaster
      - POSTGRES_HOST_AUTH_METHOD=md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggimallaabhishek"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskmaster-network

  backend:
    build: ./backend
    container_name: taskmaster-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=aggimallaabhishek
      - DB_PASSWORD=taskmaster_dev_password
      - DB_NAME=taskmaster
      - DB_POOL_MIN=2
      - DB_POOL_MAX=10
      - SESSION_SECRET=docker-dev-secret-key-change-in-production
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
      - CORS_ORIGIN=http://localhost:3000
      - FRONTEND_URL_DEV=http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taskmaster-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: taskmaster-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
    networks:
      - taskmaster-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  taskmaster-network:
    driver: bridge

